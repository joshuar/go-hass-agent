name: 🧪 Perform code testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "tests-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false          # Let other platforms finish even if one fails
      matrix:
        include:
          - platform: linux/arm/v6
            goarch: arm
            goarm: 6
          - platform: linux/arm/v7
            goarch: arm
            goarm: 7
          - platform: linux/arm64
            goarch: arm64
          - platform: linux/amd64
            goarch: amd64

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.archive.ubuntu.com:80
            *.microsoft.com:443
            185.125.188.54:443
            185.125.188.57:443
            185.125.188.58:443
            185.125.188.59:443
            44.231.40.74:443
            44.236.18.214:443
            52.239.171.36:443
            api.codecov.io:443
            api.github.com:443
            cli.codecov.io:443
            esm.ubuntu.com:443
            github.com:443
            golang.org:443
            hosted-compute-watchdog-prod-eus-01.githubapp.com:443
            hosted-compute-watchdog-prod-eus-02.githubapp.com:443
            hosted-compute-watchdog-prod-iad-02.githubapp.com:443
            ingest.codecov.io:443
            keybase.io:443
            motd.ubuntu.com:443
            o26192.ingest.us.sentry.io:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        id: setup_go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run tests
        run: go test -ldflags="-w -s -X github.com/joshuar/go-hass-agent/config.AppVersion=$(git describe --tags --always --long --dirty)" -coverprofile=coverage.txt -v ./...

      - name: Upload Coverage
        id: upload_coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v4
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          files: ./coverage.txt
          fail_ci_if_error: false
